name: Diagnose LUCRUM Bridge Account Source

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Show Account Loading Code
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 5m
          script: |
            Write-Host "=== LINES WITH 'lucrum' OR 'account' (case insensitive) ===" -ForegroundColor Cyan
            $scriptPath = "C:\mt5_bridge_service\mt5_bridge_lucrum.py"
            Get-Content $scriptPath | Select-String -Pattern "lucrum|LUCRUM_ACCOUNTS|get_accounts|load_accounts|mt5_account|find\(" -CaseSensitive:$false
            
            Write-Host ""
            Write-Host "=== LINES 200-280 (likely main sync function) ===" -ForegroundColor Cyan
            Get-Content $scriptPath | Select-Object -Skip 199 -First 80
      
      - name: Report
        if: always()
        run: |
          echo "# Account Loading Code" >> $GITHUB_STEP_SUMMARY
