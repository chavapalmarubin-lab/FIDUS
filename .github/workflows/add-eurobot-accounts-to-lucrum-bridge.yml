name: Diagnose LUCRUM Bridge Account Source

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Find Account Source in Script
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 10m
          script: |
            Write-Host "=== FULL SCRIPT CONTENT ===" -ForegroundColor Cyan
            $scriptPath = "C:\mt5_bridge_service\mt5_bridge_lucrum.py"
            
            Write-Host "Showing ALL lines (to find where 13 accounts come from):" -ForegroundColor Yellow
            Get-Content $scriptPath
            
            Write-Host ""
            Write-Host "=== END OF SCRIPT ===" -ForegroundColor Cyan
      
      - name: Report
        if: always()
        run: |
          echo "# LUCRUM Bridge Diagnostic" >> $GITHUB_STEP_SUMMARY
          echo "Displayed full script to find account source" >> $GITHUB_STEP_SUMMARY
