name: Add EUROBOT Accounts (2218, 2219) to LUCRUM Bridge

on:
  workflow_dispatch:

jobs:
  add-eurobot-accounts:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Find and Update Account List in Bridge Script
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 10m
          script: |
            Write-Host "=== Finding Account List in Bridge Script ===" -ForegroundColor Cyan
            $scriptPath = "C:\mt5_bridge_service\mt5_bridge_lucrum.py"
            
            Write-Host "Lines containing 2198 or LUCRUM_ACCOUNTS or MANAGED:" -ForegroundColor Yellow
            Get-Content $scriptPath | Select-String -Pattern "2198|LUCRUM_ACCOUNTS|MANAGED_ACCOUNTS|accounts\s*="
            
            Write-Host ""
            Write-Host "=== Searching for array with account numbers ===" -ForegroundColor Cyan
            $content = Get-Content $scriptPath -Raw
            
            # Find the line with 2217 (last account)
            $lines = Get-Content $scriptPath
            for ($i = 0; $i -lt $lines.Count; $i++) {
              if ($lines[$i] -match "2198|2199.*2205|LUCRUM|MANAGED") {
                Write-Host "Line $($i+1): $($lines[$i])" -ForegroundColor Green
              }
            }
            
            Write-Host ""
            Write-Host "=== Backup and Update ===" -ForegroundColor Cyan
            Copy-Item $scriptPath "$scriptPath.bak_$(Get-Date -Format 'yyyyMMddHHmmss')"
            
            # Check if 2218/2219 already in file
            if ($content -match "2218" -and $content -match "2219") {
              Write-Host "Accounts 2218 and 2219 already exist!" -ForegroundColor Green
              exit 0
            }
            
            # Try to add after 2217 in any array format
            if ($content -match "2217,") {
              Write-Host "Found '2217,' - adding accounts after it" -ForegroundColor Green
              $content = $content -replace "2217,", "2217,`n    2218,   # EUROBOT.55`n    2219,   # EUROBOT1"
              Set-Content $scriptPath $content -Encoding UTF8
              Write-Host "Added 2218 and 2219" -ForegroundColor Green
            }
            elseif ($content -match "2217\s*\]") {
              Write-Host "Found '2217]' - adding accounts before closing bracket" -ForegroundColor Green
              $content = $content -replace "2217(\s*\])", "2217,`n    2218,   # EUROBOT.55`n    2219,   # EUROBOT1`n`$1"
              Set-Content $scriptPath $content -Encoding UTF8
              Write-Host "Added 2218 and 2219" -ForegroundColor Green
            }
            else {
              Write-Host "Could not find 2217 in expected format" -ForegroundColor Red
              Write-Host "Showing lines 20-60:" -ForegroundColor Yellow
              Get-Content $scriptPath | Select-Object -Skip 19 -First 40
              exit 1
            }
            
            Write-Host ""
            Write-Host "=== Verify Update ===" -ForegroundColor Cyan
            Get-Content $scriptPath | Select-String -Pattern "2217|2218|2219"
            
            Write-Host ""
            Write-Host "=== Restart Service ===" -ForegroundColor Cyan
            Get-Process python* -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 3
            
            Set-Location "C:\mt5_bridge_service"
            Start-Process -FilePath "python" -ArgumentList "mt5_bridge_lucrum.py" -WindowStyle Normal
            Write-Host "Service restarted" -ForegroundColor Green
      
      - name: Report
        if: always()
        run: |
          echo "# LUCRUM Bridge - EUROBOT Accounts" >> $GITHUB_STEP_SUMMARY
          echo "Added 2218 and 2219 to bridge script account list" >> $GITHUB_STEP_SUMMARY
