name: Add EUROBOT Accounts (2218, 2219) to LUCRUM Bridge

on:
  workflow_dispatch:

jobs:
  add-eurobot-accounts:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Add EUROBOT Accounts to Bridge
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 10m
          script: |
            Write-Host "=== STEP 1: Show Current Script Content ===" -ForegroundColor Cyan
            $scriptPath = "C:\mt5_bridge_service\mt5_bridge_lucrum.py"
            
            Write-Host "Current account lines:" -ForegroundColor Yellow
            Get-Content $scriptPath | Select-String -Pattern "^\s*\d{4,5}" | ForEach-Object { Write-Host $_.Line }
            
            Write-Host ""
            Write-Host "=== STEP 2: Check if accounts already exist ===" -ForegroundColor Cyan
            $content = Get-Content $scriptPath -Raw
            $has2218 = $content -match "2218"
            $has2219 = $content -match "2219"
            
            Write-Host "Account 2218 exists: $has2218" -ForegroundColor White
            Write-Host "Account 2219 exists: $has2219" -ForegroundColor White
            
            if ($has2218 -and $has2219) {
              Write-Host "Both accounts already exist - no changes needed" -ForegroundColor Green
              exit 0
            }
            
            Write-Host ""
            Write-Host "=== STEP 3: Backup and Update ===" -ForegroundColor Cyan
            Copy-Item $scriptPath "$scriptPath.bak_$(Get-Date -Format 'yyyyMMddHHmmss')"
            Write-Host "Backup created" -ForegroundColor Green
            
            # Find the line with account 2217 and insert after it
            $lines = Get-Content $scriptPath
            $found = $false
            for ($i = 0; $i -lt $lines.Count; $i++) {
              if ($lines[$i] -match "^\s*2217") {
                Write-Host "Found account 2217 at line $($i+1)" -ForegroundColor Green
                # Insert new accounts after this line
                $newLines = $lines[0..$i]
                $newLines += "    2218,   # LIVE DEMO - EUROBOT.55"
                $newLines += "    2219,   # LIVE DEMO - EUROBOT1"
                $newLines += $lines[($i+1)..($lines.Count-1)]
                Set-Content $scriptPath $newLines -Encoding UTF8
                Write-Host "Added 2218 and 2219 after line $($i+1)" -ForegroundColor Green
                $found = $true
                break
              }
            }
            
            if (-not $found) {
              Write-Host "Could not find account 2217 - trying alternate insertion point" -ForegroundColor Yellow
              # Try inserting after 20062 if 2217 not found
              for ($i = 0; $i -lt $lines.Count; $i++) {
                if ($lines[$i] -match "^\s*20062") {
                  Write-Host "Found account 20062 at line $($i+1)" -ForegroundColor Green
                  $newLines = $lines[0..$i]
                  $newLines += "    2218,   # LIVE DEMO - EUROBOT.55"
                  $newLines += "    2219,   # LIVE DEMO - EUROBOT1"
                  $newLines += $lines[($i+1)..($lines.Count-1)]
                  Set-Content $scriptPath $newLines -Encoding UTF8
                  Write-Host "Added 2218 and 2219 after line $($i+1)" -ForegroundColor Green
                  $found = $true
                  break
                }
              }
            }
            
            if (-not $found) {
              Write-Host "ERROR: Could not find insertion point" -ForegroundColor Red
              exit 1
            }
            
            Write-Host ""
            Write-Host "=== STEP 4: Verify Update ===" -ForegroundColor Cyan
            Write-Host "Account lines after update:" -ForegroundColor Yellow
            Get-Content $scriptPath | Select-String -Pattern "^\s*\d{4,5}" | ForEach-Object { Write-Host $_.Line }
            
            Write-Host ""
            Write-Host "=== STEP 5: Restart Service ===" -ForegroundColor Cyan
            Get-Process python* -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 3
            
            Set-Location "C:\mt5_bridge_service"
            Start-Process -FilePath "python" -ArgumentList "mt5_bridge_lucrum.py" -WindowStyle Normal
            Write-Host "Service restarted" -ForegroundColor Green
            
            Write-Host ""
            Write-Host "=== DONE ===" -ForegroundColor Cyan
            Write-Host "Check VPS window - should now show 15 accounts (was 13)" -ForegroundColor Green
      
      - name: Report
        if: always()
        run: |
          echo "# LUCRUM Bridge Update - EUROBOT Accounts" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Accounts Added" >> $GITHUB_STEP_SUMMARY
          echo "- **2218** - EUROBOT.55 (Euro pairs automated trading v0.55)" >> $GITHUB_STEP_SUMMARY
          echo "- **2219** - EUROBOT1 (Euro pairs automated trading)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Expected Result" >> $GITHUB_STEP_SUMMARY
          echo "Bridge should now sync 15 accounts total" >> $GITHUB_STEP_SUMMARY
