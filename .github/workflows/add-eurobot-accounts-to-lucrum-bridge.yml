name: Diagnose LUCRUM Bridge Account Source

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Find Account Source in Script
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 10m
          script: |
            Write-Host "=== LINES 1-90 OF SCRIPT ===" -ForegroundColor Cyan
            $scriptPath = "C:\mt5_bridge_service\mt5_bridge_lucrum.py"
            
            Get-Content $scriptPath | Select-Object -First 90
            
            Write-Host ""
            Write-Host "=== SEARCHING FOR ACCOUNT NUMBERS ===" -ForegroundColor Cyan
            Get-Content $scriptPath | Select-String -Pattern "2198|2199|LUCRUM_ACCOUNTS|MANAGED_ACCOUNTS|accounts\s*=\s*\["
      
      - name: Report
        if: always()
        run: |
          echo "# LUCRUM Bridge Diagnostic" >> $GITHUB_STEP_SUMMARY
          echo "Showing first 90 lines to find account list" >> $GITHUB_STEP_SUMMARY
