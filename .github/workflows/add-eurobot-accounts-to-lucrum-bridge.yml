name: Add EUROBOT Accounts (2218, 2219) to LUCRUM Bridge

on:
  workflow_dispatch:

jobs:
  add-eurobot-accounts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Add Accounts to MongoDB
        run: |
          pip install pymongo > /dev/null 2>&1
          
          cat > add_accounts.py << 'PYTHON_SCRIPT'
          from pymongo import MongoClient
          from datetime import datetime, timezone
          
          MONGO_URL = "${{ secrets.MONGO_URL }}"
          client = MongoClient(MONGO_URL, serverSelectionTimeoutMS=10000)
          db = client.fidus_production
          
          # Per SYSTEM_MASTER.md Section 4.2.1
          # Server MUST be exactly "LucrumCapital-Trade" (case-sensitive)
          
          accounts = [
              {
                  "account": 2218,
                  "password": "WmZzKz!4",
                  "server": "LucrumCapital-Trade",
                  "name": "EUROBOT.55",
                  "manager_name": "EUROBOT.55",
                  "broker": "LUCRUM Capital",
                  "platform": "MT5",
                  "fund_type": "DEMO",
                  "account_type": "live_demo",
                  "status": "active",
                  "is_active": True,
                  "initial_allocation": 100000,
              },
              {
                  "account": 2219,
                  "password": "NuevaCuenta123*",
                  "server": "LucrumCapital-Trade",
                  "name": "EUROBOT1",
                  "manager_name": "EUROBOT1",
                  "broker": "LUCRUM Capital",
                  "platform": "MT5",
                  "fund_type": "DEMO",
                  "account_type": "live_demo",
                  "status": "active",
                  "is_active": True,
                  "initial_allocation": 100000,
              }
          ]
          
          for acc in accounts:
              acc["created_at"] = datetime.now(timezone.utc)
              acc["updated_at"] = datetime.now(timezone.utc)
              
              # Add to mt5_account_config (for VPS sync)
              db.mt5_account_config.update_one(
                  {"account": acc["account"]},
                  {"$set": acc},
                  upsert=True
              )
              print(f"Added to mt5_account_config: {acc['account']} ({acc['name']})")
              
              # Add to mt5_accounts (for frontend) - without password
              acc_display = {k: v for k, v in acc.items() if k != 'password'}
              db.mt5_accounts.update_one(
                  {"account": acc["account"]},
                  {"$set": acc_display},
                  upsert=True
              )
              print(f"Added to mt5_accounts: {acc['account']}")
          
          print()
          print("Done! Accounts will sync on next VPS cycle (2 minutes)")
          client.close()
          PYTHON_SCRIPT
          
          python add_accounts.py
      
      - name: Restart VPS Bridge
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 3m
          script: |
            Write-Host "Restarting bridge to force immediate sync..." -ForegroundColor Cyan
            Get-Process python* -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 3
            Set-Location "C:\mt5_bridge_service"
            Start-Process -FilePath "python" -ArgumentList "mt5_bridge_lucrum.py" -WindowStyle Normal
            Write-Host "Done! Check VPS window - should show 15 accounts" -ForegroundColor Green
      
      - name: Report
        if: always()
        run: |
          echo "# EUROBOT Accounts Added" >> $GITHUB_STEP_SUMMARY
          echo "- 2218 (EUROBOT.55) - \$100,000" >> $GITHUB_STEP_SUMMARY
          echo "- 2219 (EUROBOT1) - \$100,000" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Server: LucrumCapital-Trade" >> $GITHUB_STEP_SUMMARY
