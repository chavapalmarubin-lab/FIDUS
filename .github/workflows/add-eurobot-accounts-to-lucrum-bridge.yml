name: Add EUROBOT Accounts (2218, 2219) to LUCRUM Bridge

on:
  workflow_dispatch:

jobs:
  add-eurobot-accounts:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Show Bridge Script Account Loading
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 10m
          script: |
            Write-Host "=== Showing Bridge Script Account Section ===" -ForegroundColor Cyan
            $scriptPath = "C:\mt5_bridge_service\mt5_bridge_lucrum.py"
            
            Write-Host "Lines 1-150 of script:" -ForegroundColor Yellow
            Get-Content $scriptPath | Select-Object -First 150
            
            Write-Host ""
            Write-Host "=== Lines containing 'account' ===" -ForegroundColor Cyan
            Get-Content $scriptPath | Select-String -Pattern "account" | Select-Object -First 30
      
      - name: Add Accounts to MongoDB Config
        run: |
          pip install pymongo > /dev/null 2>&1
          
          cat > add_accounts.py << 'PYTHON_SCRIPT'
          from pymongo import MongoClient
          from datetime import datetime, timezone
          
          mongo_uri = "${{ secrets.MONGO_URL }}"
          client = MongoClient(mongo_uri, serverSelectionTimeoutMS=10000)
          db = client.fidus_production
          
          print("=== Adding EUROBOT Accounts to mt5_account_config ===")
          print()
          
          # Define the two new accounts
          new_accounts = [
              {
                  "account": 2218,
                  "password": "WmZzKz!4",
                  "server": "Lucrumcapital-Live",
                  "name": "EUROBOT.55",
                  "manager_name": "EUROBOT.55",
                  "broker": "LUCRUM Capital",
                  "platform": "MT5",
                  "fund_type": "DEMO",
                  "account_type": "live_demo",
                  "status": "active",
                  "is_active": True,
                  "initial_allocation": 100000,
                  "created_at": datetime.now(timezone.utc),
                  "updated_at": datetime.now(timezone.utc)
              },
              {
                  "account": 2219,
                  "password": "NuevaCuenta123*",
                  "server": "Lucrumcapital-Live",
                  "name": "EUROBOT1",
                  "manager_name": "EUROBOT1",
                  "broker": "LUCRUM Capital",
                  "platform": "MT5",
                  "fund_type": "DEMO",
                  "account_type": "live_demo",
                  "status": "active",
                  "is_active": True,
                  "initial_allocation": 100000,
                  "created_at": datetime.now(timezone.utc),
                  "updated_at": datetime.now(timezone.utc)
              }
          ]
          
          for acc in new_accounts:
              result = db.mt5_account_config.update_one(
                  {"account": acc["account"]},
                  {"$set": acc},
                  upsert=True
              )
              if result.upserted_id:
                  print(f"INSERTED: Account {acc['account']} ({acc['name']})")
              else:
                  print(f"UPDATED: Account {acc['account']} ({acc['name']})")
          
          print()
          print("=== All LUCRUM accounts in mt5_account_config ===")
          accounts = list(db.mt5_account_config.find(
              {"server": {"$regex": "ucrum", "$options": "i"}},
              {"_id": 0, "account": 1, "name": 1, "is_active": 1}
          ).sort("account", 1))
          
          for acc in accounts:
              print(f"  {acc['account']}: {acc.get('name', 'N/A')} (active: {acc.get('is_active', False)})")
          
          print(f"\nTotal LUCRUM accounts: {len(accounts)}")
          
          client.close()
          PYTHON_SCRIPT
          
          python add_accounts.py
      
      - name: Restart Bridge Service
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 5m
          script: |
            Write-Host "=== Restarting Bridge Service ===" -ForegroundColor Cyan
            
            Get-Process python* -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 3
            
            Set-Location "C:\mt5_bridge_service"
            Start-Process -FilePath "python" -ArgumentList "mt5_bridge_lucrum.py" -WindowStyle Normal
            
            Write-Host "Service restarted - check VPS window for account count" -ForegroundColor Green
            Write-Host "Expected: 15 accounts (was 13)" -ForegroundColor Cyan
      
      - name: Report
        if: always()
        run: |
          echo "# LUCRUM Bridge - EUROBOT Accounts" >> $GITHUB_STEP_SUMMARY
          echo "Added accounts 2218 (EUROBOT.55) and 2219 (EUROBOT1) to MongoDB" >> $GITHUB_STEP_SUMMARY
          echo "Restarted bridge service to pick up new accounts" >> $GITHUB_STEP_SUMMARY
