name: Add EUROBOT Accounts (2218, 2219) to LUCRUM Bridge

on:
  workflow_dispatch:

jobs:
  add-eurobot-accounts:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Add EUROBOT Accounts to Bridge
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 10m
          script: |
            Write-Host "=== STEP 1: Show Script Structure ===" -ForegroundColor Cyan
            $scriptPath = "C:\mt5_bridge_service\mt5_bridge_lucrum.py"
            
            Write-Host "First 80 lines of script:" -ForegroundColor Yellow
            Get-Content $scriptPath -TotalCount 80
            
            Write-Host ""
            Write-Host "=== STEP 2: Check if accounts already exist ===" -ForegroundColor Cyan
            $content = Get-Content $scriptPath -Raw
            $has2218 = $content -match "2218"
            $has2219 = $content -match "2219"
            
            Write-Host "Account 2218 exists: $has2218" -ForegroundColor White
            Write-Host "Account 2219 exists: $has2219" -ForegroundColor White
            
            if ($has2218 -and $has2219) {
              Write-Host "Both accounts already exist - no changes needed" -ForegroundColor Green
              exit 0
            }
            
            Write-Host ""
            Write-Host "=== STEP 3: Backup ===" -ForegroundColor Cyan
            Copy-Item $scriptPath "$scriptPath.bak_$(Get-Date -Format 'yyyyMMddHHmmss')"
            Write-Host "Backup created" -ForegroundColor Green
            
            Write-Host ""
            Write-Host "=== STEP 4: Find and Update Account List ===" -ForegroundColor Cyan
            
            $lines = Get-Content $scriptPath
            $found = $false
            
            for ($i = 0; $i -lt $lines.Count; $i++) {
              # Look for line containing 2217
              if ($lines[$i] -match "2217") {
                Write-Host "Found 2217 at line $($i+1): $($lines[$i])" -ForegroundColor Green
                $newLines = $lines[0..$i]
                $newLines += "    2218,   # LIVE DEMO - EUROBOT.55"
                $newLines += "    2219,   # LIVE DEMO - EUROBOT1"
                $newLines += $lines[($i+1)..($lines.Count-1)]
                Set-Content $scriptPath $newLines -Encoding UTF8
                Write-Host "Added 2218 and 2219 after line $($i+1)" -ForegroundColor Green
                $found = $true
                break
              }
            }
            
            if (-not $found) {
              Write-Host "2217 not found, trying 20062..." -ForegroundColor Yellow
              for ($i = 0; $i -lt $lines.Count; $i++) {
                if ($lines[$i] -match "20062") {
                  Write-Host "Found 20062 at line $($i+1): $($lines[$i])" -ForegroundColor Green
                  $newLines = $lines[0..$i]
                  $newLines += "    2218,   # LIVE DEMO - EUROBOT.55"
                  $newLines += "    2219,   # LIVE DEMO - EUROBOT1"
                  $newLines += $lines[($i+1)..($lines.Count-1)]
                  Set-Content $scriptPath $newLines -Encoding UTF8
                  Write-Host "Added 2218 and 2219 after line $($i+1)" -ForegroundColor Green
                  $found = $true
                  break
                }
              }
            }
            
            if (-not $found) {
              Write-Host "20062 not found, trying 2210..." -ForegroundColor Yellow
              for ($i = 0; $i -lt $lines.Count; $i++) {
                if ($lines[$i] -match "2210") {
                  Write-Host "Found 2210 at line $($i+1): $($lines[$i])" -ForegroundColor Green
                  $newLines = $lines[0..$i]
                  $newLines += "    2218,   # LIVE DEMO - EUROBOT.55"
                  $newLines += "    2219,   # LIVE DEMO - EUROBOT1"
                  $newLines += $lines[($i+1)..($lines.Count-1)]
                  Set-Content $scriptPath $newLines -Encoding UTF8
                  Write-Host "Added 2218 and 2219 after line $($i+1)" -ForegroundColor Green
                  $found = $true
                  break
                }
              }
            }
            
            if (-not $found) {
              Write-Host "ERROR: Could not find any insertion point" -ForegroundColor Red
              Write-Host "Showing all lines with numbers:" -ForegroundColor Yellow
              for ($i = 0; $i -lt $lines.Count; $i++) {
                if ($lines[$i] -match "\d{4,5}") {
                  Write-Host "Line $($i+1): $($lines[$i])" -ForegroundColor White
                }
              }
              exit 1
            }
            
            Write-Host ""
            Write-Host "=== STEP 5: Verify Update ===" -ForegroundColor Cyan
            Write-Host "Lines containing 2218 or 2219:" -ForegroundColor Yellow
            Get-Content $scriptPath | Select-String -Pattern "2218|2219"
            
            Write-Host ""
            Write-Host "=== STEP 6: Restart Service ===" -ForegroundColor Cyan
            Get-Process python* -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 3
            
            Set-Location "C:\mt5_bridge_service"
            Start-Process -FilePath "python" -ArgumentList "mt5_bridge_lucrum.py" -WindowStyle Normal
            Write-Host "Service restarted" -ForegroundColor Green
            
            Write-Host ""
            Write-Host "=== DONE ===" -ForegroundColor Cyan
            Write-Host "Check VPS window - should now show 15 accounts" -ForegroundColor Green
      
      - name: Report
        if: always()
        run: |
          echo "# LUCRUM Bridge Update - EUROBOT Accounts" >> $GITHUB_STEP_SUMMARY
          echo "Added accounts 2218 (EUROBOT.55) and 2219 (EUROBOT1)" >> $GITHUB_STEP_SUMMARY
