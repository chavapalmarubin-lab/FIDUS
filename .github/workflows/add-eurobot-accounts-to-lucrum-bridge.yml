name: Restart LUCRUM Bridge and Verify Accounts

on:
  workflow_dispatch:

jobs:
  restart:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Restart Bridge
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 5m
          script: |
            Write-Host "=== Stopping existing bridge ===" -ForegroundColor Cyan
            Get-Process python* -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 3
            
            Write-Host "=== Starting bridge ===" -ForegroundColor Cyan
            Set-Location "C:\mt5_bridge_service"
            Start-Process -FilePath "python" -ArgumentList "mt5_bridge_lucrum.py" -WindowStyle Normal
            
            Write-Host "=== Done - check VPS window ===" -ForegroundColor Green
      
      - name: Report
        run: |
          echo "# Bridge Restarted" >> $GITHUB_STEP_SUMMARY
          echo "Check VPS window for account count" >> $GITHUB_STEP_SUMMARY
