name: Diagnose LUCRUM Bridge Account Source

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Show Lines 1-60 and Find Accounts
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 5m
          script: |
            Write-Host "=== LINES 1-60 OF mt5_bridge_lucrum.py ===" -ForegroundColor Cyan
            Get-Content "C:\mt5_bridge_service\mt5_bridge_lucrum.py" | Select-Object -First 60
      
      - name: Report
        if: always()
        run: |
          echo "# Showing first 60 lines" >> $GITHUB_STEP_SUMMARY
